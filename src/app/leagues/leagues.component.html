<app-input image="search.svg" placeholder="Поиск" [formControl]="searchControl"></app-input>

<div class="leagues__content">
  @for (league of view | async; track league.id) {
    <app-card
      [description]="league.area.name"
      [img]="league.emblem"
      [name]="league.name"
      (click)="navigationToCalendar(league.id)"
    ></app-card>
  }
</div>

<app-pagination
  [count]="(countSubject | async) ?? 0"
  (range)="onPageChange($event)"
></app-pagination>
