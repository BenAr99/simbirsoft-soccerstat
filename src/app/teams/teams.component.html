<app-input image="search.svg" placeholder="Поиск"></app-input>

<div class="teams__content">
  @for (team of paginationChange | async; track team.id) {
    <app-card
      [img]="team.crest"
      [name]="team.name"
      (click)="navigationToCalendar(team.id)"
    ></app-card>
  }
</div>

<app-pagination [count]="allTeams.length" (range)="change($event)"></app-pagination>
