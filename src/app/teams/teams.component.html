<app-input image="search.svg" placeholder="Поиск" [formControl]="searchControl"></app-input>

<div class="teams__content">
  @for (team of view | async; track team.id) {
    <app-card
      [img]="team.crest"
      [name]="team.name"
      (click)="navigationToCalendar(team.id)"
    ></app-card>
  }
</div>

<app-pagination
  [count]="(countSubject | async) ?? 0"
  (range)="onPageChange($event)"
></app-pagination>
